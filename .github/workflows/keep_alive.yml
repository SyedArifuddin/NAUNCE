name: Backend Keep-Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch: # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          # Try to get URL from secrets or environment
          URL="${{ secrets.PRODUCTION_URL }}"
          if [ -z "$URL" ]; then
            echo "ERROR: PRODUCTION_URL secret is not set."
            echo "Please go to: Settings > Secrets and variables > Actions"
            echo "Add a new Repository Secret named 'PRODUCTION_URL' with your Vercel URL (e.g., https://your-app.vercel.app)"
            exit 1
          fi
          echo "Pinging $URL/health"
          curl -I -s -X GET "$URL/health" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_TOKEN }}"
